<link rel="stylesheet" href="css/projects.css">

<a class="back-link" data-local="true" href="/#/projects">&#8592; Back to Projects</a>
<div class="project" id="project-template">
    <div class="project-screenshot image-slideshow bg-black col-4" template-for="screenshots as screenshot">
        <img class="responsive slide" src="images/projects/{{screenshot}}"/>
    </div>
    <div class="description col-6">
        <h3><a data-local="true" href="/#/project/id/{{id}}">{{title}}</a></h3>
        
        <div class="updated" template-optional="updated">Updated: {{updated}}</div>
        <div class="updated" template-optional="completed">Completed: {{completed}}</div>
        <div class="tags" template-for="tags as tag">
            <div class="tag">{{tag}}</div>
        </div>
        <div template-for="description as paragraph"><p>{{paragraph}}</p></div>
    </div>
    <div class="col-1">
        <ul class="project-links">
            <li class="icon-link play-link" template-optional="play-link">
                <a href="{{play-link}}">
                    <img src="images/icons/icon-play.png"/>
                </a>
            </li>
            <li class="icon-link github-link" template-optional="github-link">
                <a href="{{github-link}}">
                    <img src="images/icons/icon-github-octocat.png"/>
                </a>
            </li>
            <li class="icon-link youtube-link" template-optional="youtube-link">
                <a href="{{youtube-link}}">
                    <img src="images/icons/icon-youtube.png"/>
                </a>
            </li>
        </ul>
    </div>
</div>
<div class="extended-content" id="extended-content">
    <div class="row textblock" template="textblock">
        <p>{{text}}</p>
    </div>
    <div class="row slideshow" template="slideshow">
        <p>{{text}}</p>
    </div>
</div>
